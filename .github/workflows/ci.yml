name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install flakehound (editable, dev extras)
        run: pip install -e ".[dev]"

      - name: ruff check
        run: ruff check src tests

      - name: ruff format --check
        run: ruff format --check src tests

      - name: pyright
        run: pyright src

      - name: pytest
        run: pytest -p randomly -q

      - name: dogfood — flakehound scans its own tests
        run: flakehound scan tests/ --fail-on high
