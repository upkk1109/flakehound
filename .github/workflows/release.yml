name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Verify release tag matches package version
        run: |
          VERSION=$(python -c "
          import pathlib, re
          text = pathlib.Path('src/flakehound/__init__.py').read_text()
          match = re.search(r'__version__\s*=\s*[\"\']([^\"\']+)[\"\']', text)
          assert match, 'could not find __version__ in src/flakehound/__init__.py'
          print(match.group(1))
          ")
          TAG="${GITHUB_REF_NAME}"
          if [ "$TAG" != "v$VERSION" ]; then
            echo "::error::release tag '$TAG' does not match flakehound.__version__ ('v$VERSION')"
            exit 1
          fi
          echo "OK: tag $TAG matches flakehound.__version__ (v$VERSION)"

      - name: Install build backend
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      # Required for PyPI trusted publishing (OIDC) — no API token stored in the repo.
      # One-time setup: on pypi.org, project Settings -> Publishing -> add a trusted
      # publisher for this repo/workflow (owner: pctablet505, repo: flakehound,
      # workflow: release.yml, environment: pypi).
      id-token: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
